services:
  postgres:
    image: postgres:17-alpine
    container_name: the_angkor_times_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hub_network

volumes:
  postgres_data:
    driver: local

networks:
  hub_network:
    driver: bridge
